<!doctype html>
<!-- Je veux utiliser le layout défini dans le fichier layoutPrincipal -->
<html lang="en" layout:decorate="~{layouts/mainLayout}"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.w3.org/1999/xhtml">


<body>
<!-- main : c'est le contenu principal de la page -->
<!-- avec layout:fragment="contenu", je vais remplacer le main de mon layout par celui de ma page -->
<main layout:fragment="contenu">

    <h1 th:text="#{titre.encheres}"></h1>

    <section id="filters-menu">

        <form th:action="@{/}" method="get" class="flex-row">

            <div>

                <input type="search" name="recherche" placeholder="🔍 Votre recherche...">

                <p>
                    <label for="categories">Catégories : </label>
                    <select name="categories" id="categories">
                        <option value="informatique">Informatique</option>
                        <option value="ameublement">Ameublement</option>
                        <option value="vetements">Vêtements</option>
                        <option value="loisirs">Sport & Loisirs</option>
                    </select>
                </p>

            </div>

            <div>
                <input type="submit" value="Rechercher">
            </div>

        </form>

        <form action="" method="GET">
                <div>
                    <p>
                        <input type="radio" name="filtreAccueil">

                    </p>

                    <p>
                        <label for="encheresOuvertes">Enchères ouvertes</label>
                        <input type="checkbox" name="enchereOuvertes" id="encheresOuvertes">
                    </p>
                    <p>
                        <label for="encheresEnCours">Mes enchères en cours</label>
                        <input type="checkbox" name="enchereEnCours" id="encheresEnCours">
                    </p>
                    <p>
                        <label for="encheresRemportees">Mes enchères rapportées</label>
                        <input type="checkbox" name="enchereRemportees" id="encheresRemportees">
                    </p>

                </div>

                <div>
                    <p>
                        <input type="radio" name="filtreAccueil">

                    </p>

                    <p>
                        <label for="ventesEnCours">Mes ventes en cours</label>
                        <input type="checkbox" name="ventesEnCours" id="ventesEnCours">
                    </p>
                    <label for="ventesNonDebutees">Ventes non débutées</label>
                    <input type="checkbox" name="ventesNonDebutees" id="ventesNonDebutees">
                    <p>
                        <label for="ventesTerminees">Ventes terminées</label>
                        <input type="checkbox" name="ventesTerminees" id="ventesTerminees">
                    </p>
                </div>

            </form>


    </section>

    <section id="enchere-grid">

        <article>
            <figure>
                <img src="" alt="">
            </figure>

            <div>
                <h3>Nom de l'article</h3>
                <p>Prix : 210 points
                Fin de l'enchère <time> 10/08/2018 </time></p>
                <p>Vendeur : <a>jojo44</a></p>
                <div class="etat-article"></div>
            </div>

        </article>

    </section>


</main>

</body>

</html>
