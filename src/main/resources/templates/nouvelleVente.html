<!doctype html>
<!-- Je veux utiliser le layout défini dans le fichier layoutPrincipal -->
<html lang="fr" layout:decorate="~{layouts/mainLayout}" xmlns:layout="http://www.w3.org/1999/xhtml">
<body>

  <main layout:fragment="contenu">
    <h1 th:text="#{newVente.titre}"></h1>
<!--    <img src="#" alt="image de l'objet">-->

    <form method="post" th:action="@{/nouvelleVente}" th:object="${article}">
      <label for="article" th:text="#{newVente.article}"></label>
      <input type="text" id="article" th:field="*{nom}" name="article">
      <br>

      <label for="description" th:text="#{newVente.description}"></label>
      <input type="text" id="description" th:field="*{description}" name="description">
      <br>

      <label for="categorie" th:text="#{newVente.categorie}"></label>
      <select id="categorie" th:field="*{noCategorie}" name="categorie">
        <option th:each="categorie : ${categorie}" th:text="${categorie.libelle}" th:value="${categorie.idCategorie}"></option>
      </select>
      <br>

<!--      <label for="photo" th:text="#{newVente.photo}"></label>-->
<!--      <input type="file" id="photo" name="photo" accept="image/png, image/jpeg">-->
<!--      <br>-->

      <label for="miseAprix" th:text="#{newVente.miseAprix}"></label>
      <input type="number"  th:field="*{miseAPrix}" id="miseAprix" name="miseAprix">
      <br>

      <label for="debutEnchere" th:text="#{newVente.debutEnchere}"></label>
      <input type="date" th:field="*{dateDebut}" id="debutEnchere" name="debutEnchere">
      <br>

      <label for="finEnchere" th:text="#{newVente.finEnchere}"></label>
      <input type="date" th:field="*{dateFin}" id="finEnchere" name="finEnchere">
      <br>
<!--  todo : afficher adresse du vendeur aka l'utilisateur actif  -->
      <fieldset>
        <legend th:text="#{newVente.adresseRetrait}"></legend>
        <label for="rue" th:text="#{newVente.rue}"></label>
        <input type="text" th:field="*{adresseRetrait.rue}" id="rue" name="rue">
        <br>
        <label for="cp" th:text="#{newVente.cp}"></label>
        <input type="text" th:field="*{adresseRetrait.codePostale}" id="cp" name="cp">
        <br>
        <label for="ville" th:text="#{newVente.ville}"></label>
        <input type="text" th:field="*{adresseRetrait.ville}" id="ville" name="ville">
      </fieldset>
      <input type="submit" th:value="#{bouton.enregistrer}">
      <input type="reset" th:value="#{bouton.annuler}">
    </form>
  </main>

</body>
</html>
